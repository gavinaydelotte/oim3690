<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="description" content="Contact Gavin Aydelotte">
		<title>Contact | Gavin Aydelotte</title>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="css/styles.css">
		<style>
			/* ── Contact page styles ── */
			.contact-hero {
				padding: 120px 24px 60px;
				text-align: center;
			}
			.contact-hero h1 {
				font-size: clamp(1.8rem, 4vw, 2.5rem);
				font-weight: 700;
				margin-bottom: 12px;
			}
			.contact-hero p {
				color: var(--muted);
				font-size: 1.05rem;
			}

			.form-section {
				max-width: 640px;
				margin: 0 auto;
				padding: 0 24px 80px;
			}

			.contact-form {
				background: var(--glass);
				border: 1px solid rgba(11, 38, 57, 0.08);
				border-radius: var(--radius);
				padding: 40px;
				box-shadow: 0 4px 24px var(--shadow);
				display: flex;
				flex-direction: column;
				gap: 20px;
			}

			.form-row {
				display: flex;
				gap: 16px;
			}

			.form-group {
				display: flex;
				flex-direction: column;
				gap: 6px;
				flex: 1;
			}

			label {
				font-size: 0.875rem;
				font-weight: 600;
				color: var(--text);
			}

			input,
			textarea {
				font-family: inherit;
				font-size: 0.95rem;
				color: var(--text);
				background: var(--white);
				border: 1px solid rgba(11, 38, 57, 0.15);
				border-radius: 8px;
				padding: 10px 14px;
				transition: border-color 0.2s, box-shadow 0.2s;
				width: 100%;
			}

			input:focus,
			textarea:focus {
				outline: none;
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(43, 154, 163, 0.15);
			}

			textarea {
				resize: vertical;
				min-height: 140px;
			}

			.btn-submit {
				align-self: flex-start;
				background: var(--accent);
				color: var(--white);
				font-family: inherit;
				font-size: 0.95rem;
				font-weight: 600;
				border: none;
				border-radius: 8px;
				padding: 12px 28px;
				cursor: pointer;
				transition: background 0.2s, transform 0.1s;
			}

			.btn-submit:hover {
				background: var(--accent-dark);
			}

			.btn-submit:active {
				transform: scale(0.97);
			}

			/* Responsive: stack the name/email row on small screens */
			@media (max-width: 500px) {
				.form-row {
					flex-direction: column;
				}
				.contact-form {
					padding: 28px 20px;
				}
			}
		</style>
	</head>
	<body>
		<nav class="nav">
			<div class="nav-inner">
				<a href="index.html" class="nav-brand">GA</a>
				<ul class="nav-links">
					<li><a href="index.html#about">About</a></li>
					<li><a href="index.html#interests">Interests</a></li>
					<li><a href="index.html#activities">Activities</a></li>
					<li><a href="logs.html">Logs</a></li>
					<li><a href="contact.html" class="nav-cta">Contact</a></li>
				</ul>
			</div>
		</nav>

		<main>
			<header class="contact-hero">
				<h1>Get in Touch</h1>
				<p>Have a question or want to connect? Send me a message below.</p>
			</header>

			<section class="form-section" aria-label="Contact form">
				<form class="contact-form" action="#" method="post">
					<div class="form-row">
						<div class="form-group">
							<label for="name">Name</label>
							<input type="text" id="name" name="name" placeholder="Your name" required>
						</div>
						<div class="form-group">
							<label for="email">Email</label>
							<input type="email" id="email" name="email" placeholder="you@example.com" required>
						</div>
					</div>

					<div class="form-group">
						<label for="subject">Subject</label>
						<input type="text" id="subject" name="subject" placeholder="What's this about?">
					</div>

					<div class="form-group">
						<label for="message">Message</label>
						<textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
					</div>

					<button type="submit" class="btn-submit">Send Message</button>
				</form>
			</section>
		</main>

		<footer class="footer">
			<div class="container">
				<p>&copy; 2025 Gavin Aydelotte. Built from scratch.</p>
			</div>
		</footer>
	</body>
</html>
